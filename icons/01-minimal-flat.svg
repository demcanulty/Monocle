<!-- Variation 1: Minimal Flat — Single-weight rim, 3-4 color stops, perfectly clean -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="m1-nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="25%" stop-color="#F5A623"/>
      <stop offset="60%" stop-color="#2A7B8B"/>
      <stop offset="100%" stop-color="#0D2B45"/>
    </radialGradient>
  </defs>

  <!-- Nebula fill -->
  <circle cx="256" cy="246" r="155" fill="url(#m1-nebula)"/>

  <!-- Rim -->
  <circle cx="256" cy="246" r="155" fill="none" stroke="#C8CDD3" stroke-width="12"/>

  <!-- Star core -->
  <circle cx="256" cy="246" r="12" fill="#FFF8E1"/>

  <!-- Chain -->
  <line x1="370" y1="360" x2="430" y2="450" stroke="#C8CDD3" stroke-width="4" stroke-linecap="round"/>
  <line x1="430" y1="450" x2="420" y2="480" stroke="#C8CDD3" stroke-width="4" stroke-linecap="round"/>
</svg>
