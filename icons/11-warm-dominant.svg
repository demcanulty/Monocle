<!-- Variation 11: Warm Dominant — Gold rim, amber-to-white nebula, copper chain. Minimal blue -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="m11-nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="15%" stop-color="#FFF3C4"/>
      <stop offset="35%" stop-color="#F5A623"/>
      <stop offset="55%" stop-color="#D4722A"/>
      <stop offset="75%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#3D1C02"/>
    </radialGradient>
    <linearGradient id="m11-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#C8982A"/>
      <stop offset="100%" stop-color="#D4A83A"/>
    </linearGradient>
  </defs>

  <!-- Warm nebula -->
  <circle cx="256" cy="246" r="150" fill="url(#m11-nebula)"/>

  <!-- Subtle warm rings -->
  <circle cx="256" cy="246" r="110" fill="none" stroke="#C8782A" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="246" r="75" fill="none" stroke="#D4922A" stroke-width="1.5" opacity="0.25"/>

  <!-- Star core — white hot -->
  <circle cx="256" cy="246" r="14" fill="#FFF8E1"/>
  <circle cx="256" cy="246" r="6" fill="#FFFFFF"/>

  <!-- Gold rim -->
  <circle cx="256" cy="246" r="155" fill="none" stroke="url(#m11-rim)" stroke-width="12"/>

  <!-- Copper chain -->
  <line x1="370" y1="360" x2="428" y2="450" stroke="#B87333" stroke-width="5" stroke-linecap="round"/>
  <line x1="428" y1="450" x2="420" y2="480" stroke="#B87333" stroke-width="5" stroke-linecap="round"/>
</svg>
