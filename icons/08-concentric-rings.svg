<!-- Variation 8: Concentric Rings — Clean evenly-spaced circles with alternating opacity. Technical feel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="m8-bg" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#0F1B2B"/>
      <stop offset="100%" stop-color="#060E18"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="256" cy="246" r="155" fill="url(#m8-bg)"/>

  <!-- Concentric rings — evenly spaced, alternating opacity, color transition -->
  <circle cx="256" cy="246" r="140" fill="none" stroke="#0D3B4F" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="246" r="128" fill="none" stroke="#0F4B5F" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="246" r="116" fill="none" stroke="#1A5B6B" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="246" r="104" fill="none" stroke="#1F6B7B" stroke-width="1.5" opacity="0.7"/>
  <circle cx="256" cy="246" r="92" fill="none" stroke="#2A7B85" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="246" r="80" fill="none" stroke="#3A8B7F" stroke-width="1.5" opacity="0.7"/>
  <circle cx="256" cy="246" r="68" fill="none" stroke="#5A9B6A" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="246" r="56" fill="none" stroke="#8AAB55" stroke-width="1.5" opacity="0.7"/>
  <circle cx="256" cy="246" r="44" fill="none" stroke="#B8A040" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="246" r="32" fill="none" stroke="#D4942A" stroke-width="2" opacity="0.8"/>
  <circle cx="256" cy="246" r="20" fill="none" stroke="#E8A830" stroke-width="2" opacity="0.6"/>

  <!-- Star core -->
  <circle cx="256" cy="246" r="10" fill="#F5CE6E"/>
  <circle cx="256" cy="246" r="4" fill="#FFFFFF"/>

  <!-- Rim -->
  <circle cx="256" cy="246" r="155" fill="none" stroke="#8A9098" stroke-width="8"/>

  <!-- Chain -->
  <line x1="368" y1="358" x2="425" y2="445" stroke="#8A9098" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="425" y1="445" x2="418" y2="475" stroke="#8A9098" stroke-width="3.5" stroke-linecap="round"/>
</svg>
