<!-- Variation 5: Duotone — Two hue families only: teal + gold. Maximum contrast -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="m5-nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4A0"/>
      <stop offset="25%" stop-color="#D4942A"/>
      <stop offset="55%" stop-color="#1A6B6B"/>
      <stop offset="100%" stop-color="#0A3A3A"/>
    </radialGradient>
  </defs>

  <!-- Nebula -->
  <circle cx="256" cy="246" r="155" fill="url(#m5-nebula)"/>

  <!-- Teal mid-ring accent -->
  <circle cx="256" cy="246" r="110" fill="none" stroke="#1A7B7B" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="246" r="80" fill="none" stroke="#2A8B7B" stroke-width="1.5" opacity="0.4"/>

  <!-- Gold inner ring -->
  <circle cx="256" cy="246" r="45" fill="none" stroke="#D4942A" stroke-width="2" opacity="0.6"/>

  <!-- Star core — gold -->
  <circle cx="256" cy="246" r="14" fill="#FFE4A0"/>
  <circle cx="256" cy="246" r="6" fill="#FFFDF0"/>

  <!-- Rim — gold tinted -->
  <circle cx="256" cy="246" r="155" fill="none" stroke="#C49B3C" stroke-width="12"/>

  <!-- Chain -->
  <line x1="370" y1="360" x2="428" y2="450" stroke="#C49B3C" stroke-width="5" stroke-linecap="round"/>
  <line x1="428" y1="450" x2="420" y2="480" stroke="#C49B3C" stroke-width="5" stroke-linecap="round"/>
</svg>
