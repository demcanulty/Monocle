<!-- Variation 9: Single Spiral — One continuous logarithmic spiral, colored along its length -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="m9-bg" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#0F1B2B"/>
      <stop offset="100%" stop-color="#060E18"/>
    </radialGradient>
    <linearGradient id="m9-spiral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="15%" stop-color="#F5A623"/>
      <stop offset="40%" stop-color="#2A8B7B"/>
      <stop offset="70%" stop-color="#1A5B7B"/>
      <stop offset="100%" stop-color="#0D3B55"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="256" cy="246" r="155" fill="url(#m9-bg)"/>

  <!-- Single logarithmic spiral — approximated with cubic beziers -->
  <path d="M256,246
           C256,242 260,238 264,238
           C272,238 276,246 276,254
           C276,270 260,278 244,278
           C220,278 210,254 210,238
           C210,206 236,192 262,192
           C298,192 316,222 316,258
           C316,302 282,324 244,324
           C198,324 172,286 172,240
           C172,186 210,156 264,156
           C326,156 358,200 358,258
           C358,326 314,362 244,362
           C166,362 132,314 132,240
           C132,158 182,118 268,118"
        fill="none" stroke="url(#m9-spiral)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Star core -->
  <circle cx="256" cy="246" r="8" fill="#FFFBE6"/>
  <circle cx="256" cy="246" r="3.5" fill="#FFFFFF"/>

  <!-- Rim -->
  <circle cx="256" cy="246" r="155" fill="none" stroke="#A0A8B0" stroke-width="8"/>

  <!-- Chain — fine, elegant -->
  <line x1="368" y1="358" x2="422" y2="442" stroke="#A0A8B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="422" y1="442" x2="416" y2="470" stroke="#A0A8B0" stroke-width="3" stroke-linecap="round"/>
</svg>
